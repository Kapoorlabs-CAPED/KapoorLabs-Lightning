# Model architecture parameters (must match training config)
growth_rate: 4
block_config: [6]
num_init_features: 32
bottleneck_size: 4
kernel_size: 7
attn_heads: 8
seq_len: 25
num_classes: 3
model_choice: 'inception'

# Prediction parameters
tracklet_length: 25
features: 'shape_dynamic'
track_id_column: 'Track_ID'
t_min: null
t_max: null
# Prediction time window [start, end] in frame units (inclusive).
# DataFrame is truncated to t in [start, end]. Use -1 for `end` to mean
# the last available frame. Span (end - start + 1) must be > 50.
# Set to null to disable.
time_window: [100, -1]

# Transition-time determination: sweep sliding windows to find when
# per-class predictions become stable vs. flip-flopping. On by default.
transition_time_determination: true
transition_window_span: 50
transition_window_stride: 25

# Input mode: 'csv' or 'xml'
input_mode: 'xml'
accelerator: 'cuda'
